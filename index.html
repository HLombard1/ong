<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Adoção</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="a">

    <form id="formAdocao">

        <h2>Formulario de Adoção</h2>
        <label for="nome">Nome:</label>
        <input type = "text" id="nome" placeholder="Digite seu nome">
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Digite seu email">
        <br><br>
        <label for="telefone">Telefone:</label>
        <input type="telefone" id="telefone"placeholder="Digite seu telefone">
        <br><br>
        <label for="cpf">Cpf:</label>
        <input type="cpf" id="cpf"placeholder="Digite seu cpf">
        <br><br>
        <label for="idade">Idade:</label>
        <input type="idade" id="idade"placeholder="Digite sua idade">
        <br><br>
        <label for="cidade">Cidade:</label>
        <input type = "text" id="cidade" placeholder="Digite sua cidade">
        <br><br>
        <label for="moradia">Moradia:</label>
        <select name="moradia" id="moradia">
        <option value="">Selecione</option>
        <option value="casa" >Casa</option>
        <option value="apartamento">Apartamento</option></select>
        <br><br>
        <label for="quintal">Tem quintal?</label>
        <input type="radio" name="quintal" value="sim">sim
        <input type="radio" name="quintal" value="nao">não
        <br><br>
        <label for="pet">Já teve pet?</label>
        <input type="radio" name="pet" value="sim">sim
        <input type="radio" name="pet" value="nao">não
        <br><br>
        <label for="hrs sozinho">Quantas horas o animal vai ficar sozinho?:</label><br>
        <input type="telefone" id="h"placeholder="Digite as horas">
        <br><br>
        Porque você quer adotar um animal?
        <br>
        <textarea name="adoção" id="adoção" cols="29" rows="6"></textarea>
        <br><br>
        Aceite o termo de responsabilidade<input type="checkbox" name="checkbox">
        <br><br>
        <button type="submit">Enviar</button>
    </form>

 </div>
</body>
</html>
